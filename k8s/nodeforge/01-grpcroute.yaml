---
# NodeForge GRPCRoute — Cilium Gateway를 통해 NodeForge gRPC 엔드포인트 노출
#
# 전제 조건:
#   - Gateway k8s/gateway/01-gateway.yaml 적용 완료
#   - NodeForge deploy/ 매니페스트 적용 완료
#       kubectl apply -f /opt/go/src/github.com/HeaInSeo/NodeForge/deploy/
#
# NodeKit에서 접속 방법:
#   addr := "nodeforge.10.113.24.96.nip.io:80"
#   conn, err := grpc.NewClient(addr,
#       grpc.WithTransportCredentials(insecure.NewCredentials()))
#
# 확인 명령:
#   kubectl get grpcroute -n nodeforge-system
#   grpcurl -plaintext nodeforge.10.113.24.96.nip.io:80 list
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: nodeforge-grpc
  namespace: nodeforge-system
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: nodeforge-system
  hostnames:
    - "nodeforge.10.113.24.96.nip.io"
  rules:
    - backendRefs:
        - name: nodeforge-controlplane
          port: 50051
